<script type="module">
    // ====================== MODERN FIREBASE ======================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBdCYNGSEGt6mT4C_KmVh_t2m_oSTLQLsg",
        authDomain: "islamic-hub-d49a6.firebaseapp.com",
        projectId: "islamic-hub-d49a6",
        storageBucket: "islamic-hub-d49a6.firebasestorage.app",
        messagingSenderId: "1014299625527",
        appId: "1:1014299625527:web:04e9bc07ff20573a6c17b2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const contentRef = ref(db, 'content');

    /* ============================================================
       CONFIG
       ============================================================ */
    const PASS = 'Islamic123';

    /* ============================================================
       STATE
       ============================================================ */
    let curTab = 'articles';
    let allData = { articles:[], pdfs:[], books:[] };
    let curChips = [];
    let editId = null;
    let editType = null;
    let curDetailId = null;
    let curDetailType = null;
    let fontSizeStep = 0;

    /* ============================================================
       UTILS (same as original)
       ============================================================ */
    function safe(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function loading(on) {
        document.getElementById('loader').classList.toggle('on', on);
    }

    function readTime(text) {
        const words = (text||'').trim().split(/\s+/).length;
        const mins = Math.max(1, Math.round(words / 200));
        return mins + ' min read';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ============================================================
       FIREBASE (UPDATED)
       ============================================================ */
    function loadData() {
        loading(true);
        onValue(contentRef, (snap) => {
            loading(false);
            const v = snap.val();
            if (v) {
                allData.articles = v.articles || [];
                allData.pdfs = v.pdfs || [];
                allData.books = v.books || [];
            } else {
                allData = { articles:[], pdfs:[], books:[] };
            }
            renderStats();
            const items = curTab === 'bookmarks' ? getBookmarkedItems() : allData[curTab];
            renderCards(items);
        }, () => {
            loading(false);
            loadLocal();
        });
    }

    function saveData() {
        loading(true);
        set(contentRef, { articles:allData.articles, pdfs:allData.pdfs, books:allData.books })
            .then(() => loading(false))
            .catch(() => { loading(false); saveLocal(); });
    }

    function loadLocal() {
        try {
            const r = localStorage.getItem('iw_v4');
            if (r) {
                const p = JSON.parse(r);
                allData.articles = p.articles || [];
                allData.pdfs = p.pdfs || [];
                allData.books = p.books || [];
            }
        } catch(e) {}
        renderStats();
        renderCards(allData[curTab]);
    }

    function saveLocal() {
        localStorage.setItem('iw_v4', JSON.stringify(allData));
    }

    /* Baqi saare functions original file ke mutabiq same hain (renderTabs, renderCards, openDetail, admin, form, etc.) */

    /* BOOT */
    renderTabs();
    renderStats();
    loadData();
</script>
